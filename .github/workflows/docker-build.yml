# ═══════════════════════════════════════════════════════════════════════════════
# DialogMesh v3.0 — Docker Build & Validation
# ═══════════════════════════════════════════════════════════════════════════════
#  Validates: Dockerfile build + docker-compose orchestration + health checks
#  Trigger: push to main, pull_request to main, manual dispatch
# ───────────────────────────────────────────────────────────────────────────────

name: Docker Build & Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: dialogmesh
  IMAGE_TAG: v3.0.0

jobs:
  # ═─ Stage 1: Backend Docker Image Build ─═════════════════════════════════════
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (multi-stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect image
        run: |
          docker images ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker inspect ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --format='{{.Size}}' | awk '{print "Image size:", $1/1024/1024, "MB"}'

  # ═─ Stage 2: Frontend Build + Full Compose Validation ─═════════════════════
  validate-compose:
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Load backend image from cache
        uses: docker/setup-buildx-action@v3

      - name: Rebuild backend image for compose
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -f Dockerfile .

      - name: Start services (docker-compose up)
        run: |
          docker compose up -d
          sleep 15

      - name: Wait for backend health
        run: |
          for i in {1..30}; do
            if curl -f http://localhost:8000/health; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Test API endpoints
        run: |
          echo "=== Health Check ==="
          curl -s http://localhost:8000/health | python -m json.tool

          echo "=== API Status ==="
          curl -s http://localhost:8000/api/v1/status | python -m json.tool || true

      - name: Test Nginx frontend proxy
        run: |
          echo "=== Nginx Root (should return index.html) ==="
          curl -s -o /dev/null -w "%{http_code}" http://localhost/

          echo "=== Nginx API proxy (should return 200) ==="
          curl -s -o /dev/null -w "%{http_code}" http://localhost/health

      - name: Test WebSocket endpoint
        run: |
          echo "=== WebSocket handshake ==="
          curl -i -N \
            -H "Connection: Upgrade" \
            -H "Upgrade: websocket" \
            -H "Host: localhost" \
            -H "Origin: http://localhost" \
            http://localhost/ws || echo "WS test (expected to timeout on idle)"

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker compose logs app
          echo "=== Nginx logs ==="
          docker compose logs nginx

      - name: Cleanup
        if: always()
        run: docker compose down -v
