# ═══════════════════════════════════════════════════════════════════════════════
# DialogMesh v3.0 — Docker Build & Validation
# ═══════════════════════════════════════════════════════════════════════════════
#  Validates: Dockerfile build + docker-compose orchestration + health checks
#  Trigger: push to main, pull_request to main, manual dispatch
# ───────────────────────────────────────────────────────────────────────────────

name: Docker Build & Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  IMAGE_NAME: dialogmesh
  IMAGE_TAG: v3.0.0

jobs:
  # ═─ Stage 1: Backend Docker Image Build ─═════════════════════════════════════
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (multi-stage)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: false
          load: true
          tags: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect image
        run: |
          docker images ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          docker inspect ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} --format='{{.Size}}' | awk '{print "Image size:", $1/1024/1024, "MB"}'

  # ═─ Stage 2: Frontend Build + Full Compose Validation ─═════════════════════
  # NOTE: Skipped by default — compose validation requires LLM provider config
  #       and significant resources. Re-enable when environment is ready.
  validate-compose:
    if: false
    runs-on: ubuntu-latest
    needs: build-backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build

      - name: Set up Docker Compose
        run: |
          docker compose version

      - name: Load backend image from cache
        uses: docker/setup-buildx-action@v3

      - name: Rebuild backend image for compose
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }} -f Dockerfile .

      - name: Start services (docker-compose up)
        run: |
          docker compose up -d
          echo "Waiting 60s for app to start (healthcheck start_period=60s)..."
          sleep 60

      - name: Wait for backend health
        run: |
          # Verify app container is running first
          for i in {1..10}; do
            if docker compose ps | grep -q "dialogmesh-app"; then
              echo "App container is running"
              break
            fi
            echo "Waiting for app container... ($i/10)"
            sleep 3
          done
          # Check health via container exec (app only exposes port 8000 internally)
          for i in {1..30}; do
            if docker compose exec -T app curl -f -s http://localhost:8000/health; then
              echo "Backend is healthy"
              break
            fi
            echo "Waiting for backend health... ($i/30)"
            sleep 2
          done
          # Also verify via nginx proxy (nginx depends_on app:service_healthy)
          curl -f -s http://localhost/health || echo "Nginx proxy not ready yet (may still be starting)"

      - name: Test API endpoints
        run: |
          echo "=== Health Check (via nginx proxy) ==="
          curl -s http://localhost/health | python -m json.tool

          echo "=== API Status (via nginx proxy) ==="
          curl -s http://localhost/api/v1/status | python -m json.tool || true

          echo "=== Direct backend health (container internal) ==="
          docker compose exec -T app curl -s http://localhost:8000/health | python -m json.tool || true

      - name: Test Nginx frontend proxy
        run: |
          echo "=== Nginx Root (should return index.html) ==="
          curl -s -o /dev/null -w "%{http_code}\n" http://localhost/

          echo "=== Nginx API proxy /health (should return 200) ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/health)
          echo "HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "ERROR: /health did not return 200"
            exit 1
          fi

          echo "=== Nginx API proxy /api/v1/status (should return 200) ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost/api/v1/status)
          echo "HTTP code: $HTTP_CODE"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "WARNING: /api/v1/status returned $HTTP_CODE (may be expected if backend not fully initialized)"
          fi

      - name: Test WebSocket endpoint
        run: |
          echo "=== WebSocket handshake ==="
          curl -i -N \
            -H "Connection: Upgrade" \
            -H "Upgrade: websocket" \
            -H "Host: localhost" \
            -H "Origin: http://localhost" \
            http://localhost/ws || echo "WS test (expected to timeout on idle)"

      - name: Dump logs on failure
        if: failure()
        run: |
          echo "=== Backend logs ==="
          docker compose logs app
          echo "=== Nginx logs ==="
          docker compose logs nginx

      - name: Cleanup
        if: always()
        run: docker compose down -v
