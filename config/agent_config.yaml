# DialogMesh v3.0 系统配置文件
# 路径: config/agent_config.yaml

system:
  name: "DialogMesh"
  version: "3.0.0"
  debug: false
  log_level: "INFO"
  data_dir: "data"
  log_dir: "logs"

# ── LLM 提供者配置 ──
llm_providers:
  openai:
    api_key: "${OPENAI_API_KEY}"
    base_url: "https://api.openai.com/v1"
    default_model: "gpt-4o"
    max_concurrent_requests: 10
    timeout_seconds: 30

  ollama:
    base_url: "http://localhost:11434"
    default_model: "llama3"
    max_concurrent_requests: 5
    timeout_seconds: 60

# 混合路由配置
hybrid_router:
  mode: "sequential"
  health_check_interval: 30
  fallback_order: ["openai", "ollama"]

# 认知模式配置
cognitive_modes:
  fast:
    model: "gpt-3.5-turbo"
    max_tokens: 500
    temperature: 0.3
    timeout_seconds: 5
  deep:
    model: "gpt-4o"
    max_tokens: 2000
    temperature: 0.5
    timeout_seconds: 15
  reflective:
    model: "gpt-4o"
    max_tokens: 4000
    temperature: 0.7
    timeout_seconds: 30

# ── 6 个 LLM 实例配置 ──
llm_instances:
  pcr_llm:
    cognitive_mode: "fast"
    provider: "openai"
    model: "gpt-3.5-turbo"
  intent_llm:
    cognitive_mode: "fast"
    provider: "openai"
    model: "gpt-3.5-turbo"
  planning_llm:
    cognitive_mode: "deep"
    provider: "openai"
    model: "gpt-4o"
  meta_cognitive_llm:
    cognitive_mode: "deep"
    provider: "openai"
    model: "gpt-4o"
  reflective_llm:
    cognitive_mode: "reflective"
    provider: "openai"
    model: "gpt-4o"
  answer_llm:
    cognitive_mode: "deep"
    provider: "openai"
    model: "gpt-4o"

# ── 持久化配置 ──
persistence:
  database_path: "data/dialogmesh.db"
  hot_cache_size: 1000
  warm_cache_size: 10000
  auto_flush_interval: 300
  backup_interval: 86400

# ── Topic Tree 配置 ──
topic_tree:
  auto_build: false
  min_topic_size: 3
  max_topics: 100
  similarity_threshold: 0.6
  manual_factory: true

# ── 上下文管理配置 ──
context_manager:
  max_context_tokens: 8000
  compression_threshold: 6400
  pruning_strategy: "oldest_first"
  embedding_model: "text-embedding-3-small"

# ── 可观测性配置 ──
observability:
  metrics_retention_days: 7
  log_dir: "logs"
  trace_sample_rate: 1.0
  diagnostic_report_interval: 3600

# ── 服务层配置 ──
service:
  host: "0.0.0.0"
  port: 8000
  websocket_path: "/ws"
  api_prefix: "/api/v1"
  cors_origins: ["*"]
  max_connections: 1000
  heartbeat_interval: 30
  message_size_limit: 65536
  sla_timeout_seconds: 5
  hard_timeout_seconds: 30

# ── 认证配置 ──
auth:
  api_keys:
    - "dm-key-1"
    - "dm-key-2"
  admin_keys:
    - "admin-dm-key-1"

# ── 工具注册配置 ──
tools:
  auto_scan_directories: ["tools/"]
  mcp_servers: []
  default_timeout: 30

# ── 规划 Skill 配置 ──
planning_skill:
  skill_template_priority: true
  decomposition_timeout_ms: 1000
  template_match_threshold: 0.5
  fallback_to_single_task: true
