# Expertise Lexicon for Cold-Start Expertise Probe
# ──────────────────────────────────────────────────
# This file is hot-reloadable. Edit and the ExpertiseProbe will pick it up
# on the next call to reload_lexicon().
#
# Structure:
#   domains      – per-domain term lists (English + Chinese).
#   weights      – 5-dimension weights for the weighted total score.
#   thresholds   – score thresholds for routing decisions.
#   valves       – runtime safety valves (clarification rounds, degradation).

weights:
  terminology_density:    0.25   # how many domain terms appear
  parameter_precision:      0.25   # exact addresses, values, types
  query_complexity:         0.15   # length, conditions, nesting
  language_style:           0.20   # imperative vs exploratory
  historical_behaviour:     0.15   # consistency with previous turns

thresholds:
  llm_invocation:     0.72   # >= this → LLM may generate profile
  expert_bypass:      0.85   # >= this → skip LLM, deterministic expert profile
  clarification_degrade: 0.30   # <= this + repeated clarifications → degrade

valves:
  max_clarification_rounds: 3       # how many clarification rounds before degradation
  degrade_to_conservative: true     # if true, switch to conservative rule-only mode
  llm_override_requires_reason: true  # LLM threshold changes must carry a reason string

