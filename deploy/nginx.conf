# ═══════════════════════════════════════════════════════════════════════════════
# DialogMesh — Nginx Reverse Proxy + WebSocket Support
# ═══════════════════════════════════════════════════════════════════════════════
#  Mount to: /etc/nginx/conf.d/default.conf
#  Features: /v1/ proxy, /ws/ WebSocket, Gzip, Rate Limiting, Long timeouts
# ───────────────────────────────────────────────────────────────────────────────

# Rate limiting zone: 10 req/s per IP, 10 MB shared memory
limit_req_zone $binary_remote_addr zone=dialogmesh_limit:10m rate=10r/s;

upstream dialogmesh_app {
    server app:8000;

    # Connection pool tuning
    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

server {
    listen 80;
    server_name _;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip compression for static / JSON responses
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_comp_level 5;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/atom+xml
        image/svg+xml;

    # ═─ REST API Proxy (/v1/) ─══════════════════════════════════════════
    location /v1/ {
        proxy_pass http://dialogmesh_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_buffering off;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 60s;

        # Rate limit REST endpoints
        limit_req zone=dialogmesh_limit burst=5 nodelay;
        limit_req_status 429;
    }

    # ═─ WebSocket Proxy (/ws/) ─═══════════════════════════════════════════
    location /ws/ {
        proxy_pass http://dialogmesh_app;
        proxy_http_version 1.1;

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_buffering off;
        proxy_read_timeout 86400s;      # 24 h — long-lived WS connections
        proxy_send_timeout 86400s;
        proxy_connect_timeout 60s;
    }

    # ═─ Health Check Passthrough ─═════════════════════════════════════════
    location /health {
        proxy_pass http://dialogmesh_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        access_log off;
    }

    # ═─ Default / Docs / OpenAPI ─═══════════════════════════════════════
    location / {
        proxy_pass http://dialogmesh_app;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;

        # General rate limit fallback
        limit_req zone=dialogmesh_limit burst=5 nodelay;
        limit_req_status 429;
    }

    # ═─ Error Pages ─══════════════════════════════════════════════════════
    error_page 429 /429.html;
    location = /429.html {
        internal;
        return 429 '{"error":{"code":"RATE_LIMITED","message":"Too many requests","retryable":true}}';
        add_header Content-Type application/json;
    }
}
