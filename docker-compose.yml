# ═══════════════════════════════════════════════════════════════════════════════
# DialogMesh v3.0 — Docker Compose (Production)
# ═══════════════════════════════════════════════════════════════════════════════
#  Usage:
#    docker-compose up -d              # Start all services
#    docker-compose down               # Stop all services
#    docker-compose logs -f app        # Tail backend logs
#    docker-compose logs -f nginx      # Tail nginx logs
#
#  Architecture:
#    - app:   FastAPI backend (main_v3.py) on port 8000 (internal)
#    - nginx: Reverse proxy + frontend static files on port 80 (external)
# ───────────────────────────────────────────────────────────────────────────────

version: "3.8"

services:
  # ── FastAPI Backend (DialogMesh v3.0) ───────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: dialogmesh:v3.0.0
    container_name: dialogmesh-app
    expose:
      - "8000"
    volumes:
      - dialogmesh-data:/app/data
      - ./config:/app/config:ro
      - ./logs:/app/logs
    environment:
      - PYTHONPATH=/app
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - DIALOGMESH_API_HOST=0.0.0.0
      - DIALOGMESH_API_PORT=8000
      - DIALOGMESH_WORKERS=1
      - DIALOGMESH_LOG_LEVEL=INFO
      - DIALOGMESH_DB_PATH=/app/data/sessions.db
      - DIALOGMESH_TTL_DAYS=7
      # ── LLM Provider (set via .env or shell) ──
      - DIALOGMESH_API_KEY=${DIALOGMESH_API_KEY:-}
      - DIALOGMESH_JWT_SECRET=${DIALOGMESH_JWT_SECRET:-}
      - DIALOGMESH_LLM_PROVIDER=${DIALOGMESH_LLM_PROVIDER:-openai}
      - DIALOGMESH_OPENAI_API_KEY=${DIALOGMESH_OPENAI_API_KEY:-}
      - DIALOGMESH_LMSTUDIO_URL=${DIALOGMESH_LMSTUDIO_URL:-http://localhost:1234}
      # ── Rate Limiting ──
      - DIALOGMESH_RATE_LIMIT_RPS=${DIALOGMESH_RATE_LIMIT_RPS:-10}
      - DIALOGMESH_RATE_LIMIT_BURST=${DIALOGMESH_RATE_LIMIT_BURST:-5}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - dialogmesh-network

  # ── Nginx Reverse Proxy + Frontend Static Files ─────────────────────────────
  nginx:
    image: nginx:alpine
    container_name: dialogmesh-nginx
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./frontend/dist:/usr/share/nginx/html:ro
    depends_on:
      app:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - dialogmesh-network

networks:
  dialogmesh-network:
    driver: bridge

volumes:
  dialogmesh-data:
    driver: local
